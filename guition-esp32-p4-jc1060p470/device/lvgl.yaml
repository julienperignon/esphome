lvgl:
  displays: my_display
  byte_order: little_endian
  
  top_layer:
    widgets:
    
      # # Temperature
      # - label:
      #     text: "-° / -°"
      #     id: temperatures
      #     text_font: clockbar_font
      #     align: top_left
      #     x: 8
      #     y: 8
      #     text_color: 0xFFFFFF

      # Clock
      - label:
          text: "--:--"
          id: display_time
          text_font: clockbar_font
          align: top_mid
          x: 0
          y: 8
          text_align: center
          text_color: 0xFFFFFF
          
  pages:
    - id: main_page
      layout: 
        type: flex
        flex_flow: column_wrap
        pad_row: 10
        pad_column: 10
      width: 100%
      bg_color: Black
      bg_opa: cover
      pad_top: 42
      pad_bottom: 5
      pad_left: 5
      pad_right: 5
      
      widgets:     
        - button:
            height: $button_height
            width: $button_width
            id: living_room_sofa_light_button
            styles: control
            bg_color: 0x2C2C2C
            on_click:
              - homeassistant.action:
                  action: switch.toggle
                  data:
                    entity_id: switch.living_room_sofa_light
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  id: living_room_sofa_icon
                  text: $led_strip_variant
              - label:
                  align: bottom_left
                  id: living_room_sofa_label
                  text: "Movie Light"
        - obj:
            width: $button_width
            height: $button_height
            radius: $radius
            pad_all: $padding
            styles: control
            layout:
              type: flex
              flex_flow: column
              flex_align_main: start
              flex_align_cross: start
              flex_align_track: start
            widgets:
              - label:
                  id: liam_bedroom_temperature_title
                  text: "Liam's Room"
                  text_font: montserrat_16
                  text_color: 0xFFFFFF
              - obj:
                  width: 100%
                  bg_opa: TRANSP
                  border_opa: TRANSP
                  pad_all: 0
                  layout:
                    type: flex
                    flex_flow: row
                    flex_align_main: start
                    flex_align_cross: end
                    flex_align_track: start
                  widgets:
                    - label:
                        id: liam_bedroom_temperature_value_label
                        text: "--"
                        text_font: montserrat_28
                        text_color: 0xFFFFFF
                    - label:
                        id: liam_bedroom_temperature_unit_label
                        text: "°C"
                        text_font: montserrat_18
                        pad_left: 4px
                        pad_bottom: 3px
                        text_color: 0xFFFFFF