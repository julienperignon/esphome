sensor:

text_sensor:
  - platform: homeassistant
    id: liam_bedroom_temperature_text
    entity_id: sensor.liam_bedroom_temperature
    on_value:
      - lvgl.label.update:
          id: liam_bedroom_temperature_value_label
          text: !lambda |-
            if (x.empty() || x == "unknown" || x == "unavailable") {
              return std::string("--");
            }
            return x;
      - lvgl.label.update:
          id: liam_bedroom_temperature_unit_label
          text: "°C"

switch:
  - platform: homeassistant
    id: living_room_sofa_light
    entity_id: switch.living_room_sofa_light
    on_turn_on:
      then:
        - lvgl.widget.update:
            id: living_room_sofa_light_button
            state:
              checked: true
    on_turn_off:
      then:
        - lvgl.widget.update:
            id: living_room_sofa_light_button
            state:
              checked: false