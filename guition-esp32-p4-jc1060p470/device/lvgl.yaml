lvgl:
  displays: my_display
  byte_order: little_endian
  
  top_layer:
    widgets:
    
      # # Temperature
      # - label:
      #     text: "-° / -°"
      #     id: temperatures
      #     text_font: clockbar_font
      #     align: top_left
      #     x: 8
      #     y: 8
      #     text_color: 0xFFFFFF

      # Clock
      - label:
          text: "--:--"
          id: display_time
          text_font: clockbar_font
          align: top_mid
          x: 0
          y: 8
          text_align: center
          text_color: 0xFFFFFF
          
  pages:
    - id: main_page
      layout: 
        type: flex
        flex_flow: column_wrap
        pad_row: 10
        pad_column: 10
      width: 100%
      bg_color: Black
      bg_opa: cover
      pad_top: 42
      pad_bottom: 5
      pad_left: 5
      pad_right: 5
      
      widgets:     

        # Movie Scene
        # - button: 
        #     height: $button_height
        #     width: $button_width
        #     checkable: true
        #     id: living_room_sofa_light_button
        #     styles: control
        #     widgets:
        #       - label:
        #           text_font: $icon_font
        #           align: top_left
        #           id: living_room_sofa_icon                
        #           text: $led_strip_variant
        #       - label:
        #           align: bottom_left
        #           id: living_room_sofa_label
        #           text: "Movie Light"
        #     on_press:
        #       - homeassistant.service:
        #           service: switch.toggle
        #           data:
        #             entity_id: switch.living_room_sofa_light
        - button: 
            height: $button_height
            width: $button_width
            checkable: true
            id: living_room_sofa_light_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  id: living_room_sofa_icon                
                  text: $led_strip_variant
              - label:
                  align: bottom_left
                  id: living_room_sofa_label
                  text: "Movie Light"
            on_press:
              - homeassistant.service:
                  service: switch.toggle
                  data:
                    entity_id: switch.living_room_sofa_light
        - obj:
            width: 140
            height: 90
            radius: 16
            pad_all: 10
            styles: control
            layout:
              type: flex
              flex_flow: column
              flex_align_main: center
              flex_align_cross: start
              flex_align_track: start
            widgets:
              - label:
                  id: liam_bedroom_temperature_title
                  text: "\U000F050F Liam's Room"
                  text_font: montserrat_16
              - obj:
                  bg_opa: TRANSP
                  border_opa: TRANSP
                  pad_all: 0
                  layout:
                    type: flex
                    flex_flow: row
                    flex_align_main: start
                    flex_align_cross: end
                    flex_align_track: start
                  widgets:
                    - label:
                        id: temp_value_label
                        text: "--"
                        text_font: montserrat_32
                    - label:
                        id: liam_bedroom_temperature_label
                        text: "°C"
                        text_font: montserrat_18
                        pad_left: 4
                        pad_bottom: 4